name: Update Lottery Stats

on:
  schedule:
    # 매주 토요일 21:30 KST (= 12:30 UTC)
    - cron: '30 12 * * 6'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch lottery stats
        run: python backend/fetch_stats.py

      - name: Commit stats.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/stats.json
          git diff --staged --quiet && echo "변경 없음" || \
            (git commit -m "chore: update lottery stats" && git push)
