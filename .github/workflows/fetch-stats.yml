name: Update Lottery Stats

on:
  schedule:
    # 매주 토요일 21:30 KST (= 12:30 UTC)
    - cron: '30 12 * * 6'
    # 매주 목요일 22:00 KST (= 13:00 UTC) — 연금복권 추첨(20:45) 후
    - cron: '0 13 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch stats
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 13 * * 4" ]; then
            python backend/fetch_stats.py --pension-only
          else
            python backend/fetch_stats.py
          fi

      - name: Commit stats.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/stats.json
          git diff --staged --quiet && echo "변경 없음" || \
            (git commit -m "chore: update lottery stats" && git pull --rebase && git push)
